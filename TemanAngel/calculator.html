<!doctype html>
<html>

<head>
    <title>Calculator Directory</title>
    <script>
        function insert(num) {
            document.form.textview.value = document.form.textview.value + num;
        }
        function clean() {
            document.form.textview.value = "";
        }

        function equal() {
            var exp = document.form.textview.value;
            if (exp) {
                document.form.textview.value = eval(exp);
            }
        }

        function back() {
            var exp = document.form.textview.value;
            document.form.textview.value = exp.substring(0, exp.length - 1);
        }

    </script>
    <style>
        .calculator-button {
            width: 50px;
            height: 50px;
            font-size: 25px;
            margin: 2px;
            cursor: pointer;
            background: #00000078;
            border: none;
            color: white;
            border-radius: 25px;
        }

        .calculator-button:hover {
            background: black;
        }

    </style>
    <link href="../styles/main.css" rel=stylesheet type="text/css">
</head>

<body class="main">
		<!-- NAVIGATION-->
        <div class="navigationbar" id="NavigationBar">
            <a href="index.html">Home</a>
            <a href="pdf.html">Downloads</a>
            <a href="calculator.html" class="active-button">Calculator</a>
            <a href="pdf.html#CDOWNLOAD">How-to-Download</a>
            <a href="chat.php">Live Chat</a>
            <a style="float:right" id="WAKTU"></a>
        <script>
            var WAKTU = new Date();
            document.getElementById("WAKTU").innerHTML = WAKTU.toDateString();
        </script>
        </div>
        <!-- END OF NAVIGATION-->
    <div class="main">
        <div class="calculator-main">
            <form name="form">
                <input class="textview" name="textview" readonly>
            </form>
            <table>
                <tr>
                    <td><input class="calculator-button" type="button" value="C" onclick="clean()" </td>
                        <td><input class="calculator-button" type="button" value="<" onclick="back()" </td>
                            <td><input class="calculator-button" type="button" value="/" onclick="insert('/')" </td>
                                <td><input class="calculator-button" type="button" value="X" onclick="insert('*')" </td>
                </tr>
                <tr>
                    <td><input class="calculator-button" type="button" value="7" onclick="insert(7)" </td>
                        <td><input class="calculator-button" type="button" value="8" onclick="insert(8)" </td>
                            <td><input class="calculator-button" type="button" value="9" onclick="insert(9)" </td>
                                <td><input class="calculator-button" type="button" value="-" onclick="insert('-')" </td>
                </tr>
                <tr>
                    <td><input class="calculator-button" type="button" value="4" onclick="insert(4)" </td>
                        <td><input class="calculator-button" type="button" value="5" onclick="insert(5)" </td>
                            <td><input class="calculator-button" type="button" value="6" onclick="insert(6)" </td>
                                <td><input class="calculator-button" type="button" value="+" onclick="insert('+')" </td>
                </tr>
                <tr>
                    <td><input class="calculator-button" type="button" value="1" onclick="insert(1)" </td>
                        <td><input class="calculator-button" type="button" value="2" onclick="insert(2)" </td>
                            <td><input class="calculator-button" type="button" value="3" onclick="insert(3)" </td>
                                <td rowspan=5><input class="calculator-button" style="height:110px" type="button" value="=" onclick="equal()" </td>
                </tr>
                <tr>
                    <td colspan=2><input class="calculator-button" style="width:106px" type="button" value="0" onclick="insert(0)" </td>
                        <td><input class="calculator-button" type="button" value="." onclick="insert('.')" </td>
                </tr>
            </table>
        </div>
</body>

</html>
